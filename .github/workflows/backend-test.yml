name: Run Backend Tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend-test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: securepassword
          MYSQL_DATABASE: ocsl_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost -u root -psecurepassword --silent"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 30s

    env:
      GOOGLE_MAPS_API_KEY: "test_api_key_not_used"
      MYSQL_USER: root
      MYSQL_PASSWORD: securepassword
      MYSQL_HOST: 127.0.0.1
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ocsl_test
      JWT_SECRET_KEY: "test-jwt-secret-for-ci"
      REFRESH_TOKEN_SECRET_KEY: "test-refresh-secret-for-ci"
      INTERNAL_API_SECRET: "test-internal-secret-for-ci"
      FRONTEND_BASE_URL: "http://localhost:3000"
      SMTP_HOST: "localhost"
      SMTP_PORT: 1025
      SMTP_TLS: "false"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml
            backend/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e backend/

      - name: Create test database
        run: PYTHONPATH=backend python -m script.create_test_db

      - name: Run migrations
        run: cd backend && alembic upgrade head

      - name: Check migrations are up to date
        run: cd backend && alembic check

      - name: Run pytest
        run: PYTHONPATH=backend:backend/src pytest backend/test -v --tb=long --junitxml=backend/test-results/junit.xml

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: backend/test-results/junit.xml
          check_name: Test Results
          comment_title: Test Results Summary

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: |
            backend/test-results/
            backend/.pytest_cache/
          retention-days: 7
