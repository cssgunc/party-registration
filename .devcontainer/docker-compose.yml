services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    depends_on:
      - db
      - saml-idp
    volumes:
      - ..:/workspace
      - party-reg-node-modules:/workspace/frontend/node_modules
      - party-reg-pre-commit-cache:/home/vscode/.cache/pre-commit

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: "securepassword"
      MYSQL_DATABASE: "ocsl"
    ports:
      - "3306:3306"
    volumes:
      - party-reg-mysql:/var/lib/mysql

  saml-idp:
    image: kristophjunge/test-saml-idp
    ports:
      - "8080:8080"
    environment:
      - SIMPLESAMLPHP_SP_ENTITY_ID=next-auth-client
      - SIMPLESAMLPHP_SP_ASSERTION_CONSUMER_SERVICE=http://localhost:3000/api/auth/login/saml
    volumes:
      - ./saml-idp/authsources.php:/var/www/simplesamlphp/config/authsources.php

  mailpit:
    image: axllent/mailpit
    ports:
      - "8025:8025"
      - "1025:1025"

volumes:
  party-reg-mysql:
  party-reg-node-modules:
  party-reg-pre-commit-cache:
